worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;

  # Gzip compression for better latency.
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

  # Rate limiting for API paths.
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  # Basic upstream for horizontal scaling (scale `web` replicas in Swarm/K8s).
  upstream backend {
    server web:8000;
    # Add more servers for load balancing:
    # server web:8001;
  }

  server {
    listen 80;
    # SSL readiness (uncomment when you provide certs):
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    server_name _;

    # Security headers (enterprise baseline).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Add HSTS only when HTTPS is enabled.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 1m;

    # Common proxy settings.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect off;
    proxy_buffering on;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;

    location /health {
      proxy_pass http://backend/health;
      proxy_http_version 1.1;
    }

    location /metrics {
      proxy_pass http://backend/metrics;
      proxy_http_version 1.1;
    }

    # Apply rate limiting to API endpoints.
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
    }

    # Default: forward everything to the Flask app.
    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
    }
  }
}

