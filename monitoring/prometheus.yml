global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: web
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - web:8000

  - job_name: prometheus
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - prometheus:9090

